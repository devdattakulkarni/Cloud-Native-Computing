apiVersion: v1
kind: Service
metadata:
  name: kubeplus-mcp
  labels:
    kagent.dev/mcp-service: "true"
  annotations:
    kagent.dev/mcp-service-path: "/mcp"
    kagent.dev/mcp-service-port: "8000"
    kagent.dev/mcp-service-protocol: "STREAMABLE_HTTP"
spec:
  selector:
    app: kubeplus-mcp
  ports:
    - port: 8000
      targetPort: 8000
      appProtocol: mcp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeplus-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubeplus-mcp
  template:
    metadata:
      labels:
        app: kubeplus-mcp
    spec:
      initContainers:
        - name: fetch-kubeplus-plugins
          image: curlimages/curl:8.11.0
          env:
            - name: KUBEPLUS_PLUGINS_VERSION
              value: "v4.1.5"
          command:
            - sh
            - -c
            - |
              set -e
              curl -L "https://github.com/cloud-ark/kubeplus/releases/download/kubectl-plugins-${KUBEPLUS_PLUGINS_VERSION}/kubectl-plugins-${KUBEPLUS_PLUGINS_VERSION}.tar.gz" \
                -o /tmp/plugins.tar.gz

              tar -xzf /tmp/plugins.tar.gz -C /.
              chmod +x /plugins/*
          volumeMounts:
            - name: kubeplus-plugins
              mountPath: /plugins
      containers:
        - name: kubeplus-mcp
          image: kubeplus-mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: KUBEPLUS_KUBECONFIG_PATH
              value: /etc/kubeplus/kubeconfig/kubeplus-saas-provider.json
            - name: PATH
              value: "/plugins:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: MCP_DISABLE_DNS_REBINDING_PROTECTION
              value: "true"
            - name: FASTMCP_DISABLE_DNS_REBINDING_PROTECTION
              value: "true"
            - name: MCP_ALLOWED_HOSTS
              value: "kubeplus-mcp.kagent:8000,kubeplus-mcp.kagent.svc.cluster.local:8000"
            - name: FASTMCP_ALLOWED_HOSTS
              value: "kubeplus-mcp.kagent:8000,kubeplus-mcp.kagent.svc.cluster.local:8000"
          volumeMounts:
            - name: kubeplus-plugins
              mountPath: /plugins
              readOnly: true
            - name: kubeconfig
              mountPath: /etc/kubeplus/kubeconfig
              readOnly: true
      volumes:
        - name: kubeplus-plugins
          emptyDir: {}
        - name: kubeconfig
          secret:
            secretName: kubeplus-mcp-kubeconfig
