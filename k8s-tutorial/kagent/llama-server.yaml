apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-server
  namespace: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llama-server
  template:
    metadata:
      labels:
        app: llama-server
    spec:
      containers:
      - name: llama-server
        image: quay.io/ramalama/ramalama:latest
        command: [
          llama-server,
          --host, "0.0.0.0",
          --port, "8080",
          --model, /mnt/models/Qwen3-4B-Q4_K_M.gguf,
          --alias, "qwen3:4b",
          --ctx-size, "16384",
          --temp, "0.6",
          -ngl, "999",
          --threads, "6",
          --no-warmup,
          --jinja,
          --reasoning-budget, "4096",
        ]
        resources:
          limits:
            devic.es/dri: 2
        volumeMounts:
        - name: models
          mountPath: /mnt/models
      volumes:
      - name: models
        hostPath:
          path: /mnt/models
---
apiVersion: v1
kind: Service
metadata:
  name: llama-server
  namespace: ollama
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: llama-server