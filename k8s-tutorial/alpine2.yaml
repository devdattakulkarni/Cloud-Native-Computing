kind: Pod
apiVersion: v1
metadata:
  name: alpine2
  labels:
    app: alpine
spec:
  containers:
  - name: alpine
    image: alpine
    command: ["sleep", "36000"]
    volumeMounts:
    - name: named-volume-1
      mountPath: /etc
  volumes:
  - name: named-volume-1
    configMap:
      name: non-existent-configmap
