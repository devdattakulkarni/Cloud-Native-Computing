global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: "kubernetes-apiserver"
    scheme: https
    tls_config:
      ca_file: /minikube-certs/ca.crt
      cert_file: /minikube-certs/profiles/minikube/client.crt
      key_file: /minikube-certs/profiles/minikube/client.key
      insecure_skip_verify: false
    static_configs:
      - targets: ["192.168.49.2:8443"]

  - job_name: "kubelet"
    scheme: https
    tls_config:
      ca_file: /minikube-certs/ca.crt
      cert_file: /minikube-certs/profiles/minikube/client.crt
      key_file: /minikube-certs/profiles/minikube/client.key
      insecure_skip_verify: true
    metrics_path: /metrics
    static_configs:
      - targets: ["192.168.49.2:10250"]